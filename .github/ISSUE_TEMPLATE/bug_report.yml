name: Bug report
description: Something isn't working as expected
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - site (Astro renderer / theme)
        - schema (@vibecheck/schema)
        - mcp (MCP server / providers)
        - docs
        - not sure
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: "Node version, OS, host (Vercel/Netlify/…), GitHub or GitLab"
